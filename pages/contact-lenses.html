<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eyepointoptic | Contact Lenses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #d0e1f9;
      --panel: #f0f4f8;
      --text: #1a2a44;
      --text-soft: #4a5a74;
      --text-muted: #7a8a94;
      --white: #ffffff;
      --shadow: 0 28px 45px rgba(26, 42, 68, 0.15);
      --bar-shadow: 0 16px 35px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(140deg, #f0f4f8 0%, var(--panel) 48%, #e0e8f0 100%);
      color: var(--text);
      font-family: "Sora", sans-serif;
      overflow-x: hidden;
    }

    .card {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(140deg, #f0f4f8 0%, var(--panel) 45%, #e0e8f0 100%);
      overflow: hidden;
      animation: card-in 0.8s ease both;
      isolation: isolate;
    }

    .top-row {
      position: absolute;
      left: 30px;
      right: 28px;
      top: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
    }

    .logo {
      letter-spacing: -0.07em;
      font-size: 2.15rem;
      font-weight: 600;
      text-transform: lowercase;
      line-height: 1;
    }

    .side-nav {
      position: absolute;
      left: 30px;
      top: 222px;
      display: grid;
      gap: 12px;
      z-index: 5;
    }

    .side-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.73rem;
      letter-spacing: 0.1em;
      font-weight: 500;
      transition: color 0.25s ease;
    }

    .side-nav a.active {
      color: var(--text);
      font-weight: 600;
    }

    .hero {
      height: 100%;
      width: 100%;
      display: grid;
      place-items: center;
      position: relative;
    }

    .hero-copy {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(3rem, 10vw, 8rem);
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 800;
      white-space: nowrap;
      z-index: 1;
    }

    .product-wrap {
      z-index: 4;
      animation: product-in 1s ease both;
    }

    .bottom-bar {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(900px, 90vw);
      height: 80px;
      background: var(--white);
      box-shadow: var(--bar-shadow);
      display: flex;
      align-items: center;
      padding: 0 40px;
      border-radius: 40px;
      z-index: 8;
    }

    .product-name {
      font-size: 1.4rem;
      font-weight: 600;
    }

    .price {
      margin-left: auto;
      font-weight: 600;
      color: var(--text-soft);
    }

    .add-cart {
      margin-left: 40px;
      padding: 12px 30px;
      background: var(--text);
      color: var(--white);
      border: none;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes product-in {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 1024px) {
      .side-nav {
        display: none;
      }
      
      .hamburger {
        display: block;
      }
      
      .top-row {
        left: 20px;
        right: 20px;
        top: 20px;
      }
    }

    /* Hamburger Menu Styles */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1100;
      padding: 0;
      color: var(--text);
    }

    .hamburger svg line {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center;
    }

    .hamburger.active .line-middle {
      opacity: 0;
    }

    .hamburger.active .line-top {
      transform: translateY(6px) rotate(45deg);
    }

    .hamburger.active .line-bottom {
      transform: translateY(-6px) rotate(-45deg);
    }

    .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--panel);
      z-index: 1050;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .mobile-menu.active {
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-nav {
      display: flex;
      flex-direction: column;
      gap: 32px;
      text-align: center;
    }

    .mobile-nav a {
      font-size: 1.5rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .mobile-menu.active .mobile-nav a {
      opacity: 1;
      transform: translateY(0);
    }

    .mobile-menu.active .mobile-nav a:nth-child(1) { transition-delay: 0.1s; }
    .mobile-menu.active .mobile-nav a:nth-child(2) { transition-delay: 0.2s; }
    .mobile-menu.active .mobile-nav a:nth-child(3) { transition-delay: 0.3s; }
    .mobile-menu.active .mobile-nav a:nth-child(4) { transition-delay: 0.4s; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="top-row">
      <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">eyepointoptic</a>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12" class="line-middle"></line>
          <line x1="3" y1="6" x2="21" y2="6" class="line-top"></line>
          <line x1="3" y1="18" x2="21" y2="18" class="line-bottom"></line>
        </svg>
      </button>
    </header>

    <div class="mobile-menu" id="mobileMenu">
      <nav class="mobile-nav">
        <a href="index.html">Home</a>
        <a href="glasses.html">Glasses</a>
        <a href="sunglasses.html">Sunglasses</a>
        <a href="contact-lenses.html">Contact Lenses</a>
      </nav>
    </div>

    <nav class="side-nav">
      <a href="glasses.html">Glasses</a>
      <a href="sunglasses.html">Sunglasses</a>
      <a class="active" href="contact-lenses.html">Contact Lenses</a>
    </nav>

    <section class="hero">
      <div class="hero-copy">HYDRATE</div>
      <div class="product-wrap">
        <svg viewBox="0 0 100 100" width="200" height="200">
          <circle cx="50" cy="50" r="40" fill="rgba(255,255,255,0.8)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <ellipse cx="50" cy="45" rx="35" ry="30" fill="rgba(255,255,255,0.4)"/>
        </svg>
      </div>
    </section>

    <footer class="bottom-bar">
      <strong class="product-name">Moist Daily</strong>
      <span class="price">£45 / pack</span>
      <button class="add-cart">Add to Cart</button>
    </footer>
  </main>

  <h1 class="sr-only">eyepointoptic contact lenses page</h1>

  <script>
    // Mobile Menu Toggle
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    if (hamburger && mobileMenu) {
      hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        mobileMenu.classList.toggle('active');
        document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
      });
      
      mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          hamburger.classList.remove('active');
          mobileMenu.classList.remove('active');
          document.body.style.overflow = '';
        });
      });
    }
  </script>
</body>
</html>
