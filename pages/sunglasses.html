<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eyepointoptic | Sunglasses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #b6b6b6;
      --panel: #ebe8e4;
      --text: #161616;
      --text-soft: #4b4b4b;
      --text-muted: #7a7a7a;
      --line: #8d8c89;
      --white: #ffffff;
      --shadow: 0 28px 45px rgba(40, 40, 40, 0.25);
      --bar-shadow: 0 16px 35px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(140deg, #edeae6 0%, var(--panel) 48%, #e7e4df 100%);
      color: var(--text);
      font-family: "Sora", sans-serif;
      overflow-x: hidden;
    }

    .card {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: linear-gradient(140deg, #edeae6 0%, var(--panel) 45%, #e7e4df 100%);
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      animation: card-in 0.8s ease both;
      isolation: isolate;
    }

    .top-row {
      position: absolute;
      left: 30px;
      right: 28px;
      top: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
    }

    .view-toggle {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9;
      display: inline-flex;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(20, 20, 20, 0.12);
      border-radius: 999px;
      padding: 4px;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .toggle-btn {
      border: none;
      background: transparent;
      color: #545454;
      font-family: inherit;
      font-size: 0.73rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-btn.active {
      background: #111111;
      color: #f3f3f3;
    }

    .toggle-btn:not(.active):hover {
      color: #1d1d1d;
    }

    .logo {
      letter-spacing: -0.07em;
      font-size: 2.15rem;
      font-weight: 600;
      text-transform: lowercase;
      line-height: 1;
    }

    .tools {
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: var(--text-soft);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.2s ease;
    }

    .icon-btn:hover {
      transform: translateY(-1px);
    }

    .side-nav {
      position: absolute;
      left: 30px;
      top: 222px;
      display: grid;
      gap: 12px;
      z-index: 5;
    }

    .side-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.73rem;
      letter-spacing: 0.1em;
      font-weight: 500;
      transition: color 0.25s ease;
    }

    .side-nav a.active {
      color: var(--text);
      font-weight: 600;
    }

    .side-nav a:hover {
      color: var(--text);
    }

    .hero {
      --lens-y: 47%;
      --left-lens-x: 38.5%;
      --right-lens-x: 61.5%;
      --lens-radius: 17%;
      --lens-falloff: 6.5%;
      height: 100%;
      width: 100%;
      display: grid;
      place-items: center;
      position: relative;
      padding-bottom: 96px;
    }

    .grid-view {
      position: absolute;
      inset: 0;
      display: none;
      overflow: auto;
      padding: 106px 30px 28px 132px;
      z-index: 4;
    }

    .grid-products {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      width: 85%;
      margin-inline: auto;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.09);
    }

    .product-media {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #f2f1ef, #e9e7e3);
      display: grid;
      place-items: center;
      padding: 8px;
    }

    .product-media img {
      width: 92%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 9px 8px rgba(120, 120, 120, 0.25));
    }

    .product-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: #ffffff;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    .product-meta {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .product-info strong {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1c1c1c;
      letter-spacing: 0.01em;
    }

    .product-info span {
      font-size: 0.82rem;
      color: #464646;
      font-weight: 500;
    }

    .product-palette {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .card[data-view="grid"] .hero,
    .card[data-view="grid"] .slide-controls,
    .card[data-view="grid"] .bottom-bar {
      display: none;
    }

    .card[data-view="grid"] .grid-view {
      display: block;
    }

    .hero-copy {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%) scaleX(1.12);
      font-size: clamp(3.3rem, 11.8vw, 9.2rem);
      letter-spacing: 0.13em;
      color: rgba(255, 255, 255, 0.68);
      font-weight: 700;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      z-index: 1;
    }

    .hero-copy.blurred {
      filter: blur(2.4px);
    }

    .hero-copy.clear {
      filter: none;
      color: rgba(255, 255, 255, 0.72);
      z-index: 2;
    }

    .hero-copy.lens-left {
      -webkit-mask-image: radial-gradient(
        circle at var(--left-lens-x) var(--lens-y),
        #000 0 calc(var(--lens-radius) - var(--lens-falloff)),
        rgba(0, 0, 0, 0.6) calc(var(--lens-radius) - 2%),
        transparent calc(var(--lens-radius) + var(--lens-falloff))
      );
      mask-image: radial-gradient(
        circle at var(--left-lens-x) var(--lens-y),
        #000 0 calc(var(--lens-radius) - var(--lens-falloff)),
        rgba(0, 0, 0, 0.6) calc(var(--lens-radius) - 2%),
        transparent calc(var(--lens-radius) + var(--lens-falloff))
      );
    }

    .hero-copy.lens-right {
      -webkit-mask-image: radial-gradient(
        circle at var(--right-lens-x) var(--lens-y),
        #000 0 calc(var(--lens-radius) - var(--lens-falloff)),
        rgba(0, 0, 0, 0.6) calc(var(--lens-radius) - 2%),
        transparent calc(var(--lens-radius) + var(--lens-falloff))
      );
      mask-image: radial-gradient(
        circle at var(--right-lens-x) var(--lens-y),
        #000 0 calc(var(--lens-radius) - var(--lens-falloff)),
        rgba(0, 0, 0, 0.6) calc(var(--lens-radius) - 2%),
        transparent calc(var(--lens-radius) + var(--lens-falloff))
      );
    }

    .glasses-wrap {
      position: relative;
      width: min(790px, 85vw);
      height: min(360px, 45vh);
      display: grid;
      place-items: center;
      z-index: 4;
      animation: product-in 1.05s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .spec-holder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      transform: translateY(10px);
      filter: drop-shadow(0 14px 14px rgba(120, 120, 120, 0.24));
    }

    .spec-image {
      width: min(760px, 88vw);
      height: 100%;
      object-fit: contain;
      object-position: center;
      transition: opacity 0.24s ease, transform 0.24s ease;
    }

    .spec-image.is-switching {
      opacity: 0.35;
      transform: scale(0.985);
    }

    .slide-controls {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      gap: 12px;
      z-index: 6;
    }

    .arrow {
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      color: #585858;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.2s ease;
    }

    .arrow:hover {
      transform: scale(1.1);
    }

    .bottom-bar {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(930px, calc(100% - 42px));
      height: 84px;
      background: var(--white);
      box-shadow: var(--bar-shadow);
      display: grid;
      grid-template-columns: 1.3fr 1fr 1.35fr 1.45fr;
      z-index: 8;
    }

    .bar-block {
      border-right: 1px solid #ececec;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      gap: 12px;
    }

    .bar-block:last-child {
      border-right: 0;
    }

    .product-name {
      font-size: 1.54rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .price {
      margin-left: auto;
      font-size: 0.85rem;
      color: #3e3e3e;
      font-weight: 500;
    }

    .swatches {
      justify-content: flex-start;
      gap: 10px;
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid #888;
      display: inline-block;
      padding: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background: var(--swatch-color, #8e7a49);
    }

    .swatch.is-light {
      background: #f0f0f0;
      box-shadow: 0 0 0 2px #dbdbdb;
    }

    .mini-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid #8a8a8a;
      display: inline-block;
      background: var(--dot-color, #8e7a49);
    }

    .mini-swatch.is-light {
      background: #f0f0f0;
      box-shadow: 0 0 0 2px #dbdbdb;
    }

    .swatch.one { background: #8e7a49; }
    .swatch.two { background: #252525; }
    .swatch.three {
      background: #f0f0f0;
      box-shadow: 0 0 0 2px #dbdbdb;
    }
    .swatch.four { background: #24694a; }

    .details {
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      color: #303030;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .add-cart {
      border: none;
      cursor: pointer;
      background: #0f0f0f;
      color: #f7f7f7;
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .add-cart:hover {
      background: #1f1f1f;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes product-in {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 980px) {
      .grid-products {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: 92%;
      }

      .side-nav {
        top: 188px;
      }

      .hero {
        padding-bottom: 132px;
      }

      .bottom-bar {
        width: calc(100% - 30px);
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        height: auto;
      }

      .bar-block {
        min-height: 70px;
      }

      .bar-block:nth-child(2),
      .bar-block:nth-child(4) {
        border-right: 0;
      }

      .bar-block:nth-child(1),
      .bar-block:nth-child(2) {
        border-bottom: 1px solid #ececec;
      }
    }

    @media (max-width: 700px) {
      .view-toggle {
        top: 58px;
      }

      .toggle-btn {
        padding: 7px 16px;
        font-size: 0.67rem;
      }

      .card {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .top-row {
        left: 16px;
        right: 16px;
        top: 16px;
      }

      .logo {
        font-size: 1.8rem;
      }

      .side-nav {
        top: 70px;
        left: 16px;
        right: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
      }

      .side-nav a {
        font-size: 0.66rem;
      }

      .hero {
        min-height: 520px;
        padding-top: 84px;
        padding-bottom: 166px;
      }

      .grid-view {
        padding: 116px 14px 16px;
      }

      .grid-products {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        width: 100%;
      }

      .product-media {
        height: 118px;
      }

      .product-info {
        padding: 10px 10px;
      }

      .product-info strong {
        font-size: 0.82rem;
      }

      .product-info span {
        font-size: 0.75rem;
      }

      .product-palette {
        gap: 5px;
      }

      .hero-copy {
        top: 45%;
        transform: translate(-50%, -50%) scaleX(1.06);
        font-size: clamp(2.8rem, 19vw, 5.6rem);
      }

      .hero {
        --lens-y: 45%;
        --lens-radius: 18%;
        --lens-falloff: 7.2%;
      }

      .glasses-wrap {
        width: 98%;
        height: 230px;
      }

      .slide-controls {
        right: 10px;
        top: auto;
        bottom: 172px;
        transform: none;
        display: flex;
      }

      .bottom-bar {
        width: calc(100% - 18px);
        left: 50%;
        bottom: 8px;
      }

      .product-name {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Eyewear product showcase">
    <header class="top-row">
      <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">eyepointoptic</a>
      <div class="tools" aria-label="Actions">
        <button class="icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
            <circle cx="11" cy="11" r="5.6" fill="none" stroke="currentColor" stroke-width="2"></circle>
            <path d="M15.5 15.5L20.1 20.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
        <button class="icon-btn" aria-label="Bag">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path d="M8 9V7a4 4 0 0 1 8 0v2" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
            <rect x="6" y="9" width="12" height="11" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.9"></rect>
          </svg>
        </button>
      </div>
    </header>

    <div class="view-toggle" role="group" aria-label="Change product view">
      <button class="toggle-btn active" id="slideViewBtn" type="button" data-view="slide" aria-pressed="true">Slide</button>
      <button class="toggle-btn" id="gridViewBtn" type="button" data-view="grid" aria-pressed="false">Grid</button>
    </div>

    <nav class="side-nav" aria-label="Sections">
      <a href="glasses.html">Glasses</a>
      <a class="active" href="sunglasses.html">Sunglasses</a>
      <a href="contact-lenses.html">Contact Lenses</a>
    </nav>

    <section class="hero" aria-label="Product visual">
      <div class="hero-copy blurred" aria-hidden="true">AVIATOR</div>
      <div class="hero-copy clear lens-left" aria-hidden="true">AVIATOR</div>
      <div class="hero-copy clear lens-right" aria-hidden="true">AVIATOR</div>

      <div class="glasses-wrap spec-holder" aria-hidden="true">
        <img class="spec-image" id="slideSpecImage" src="../assets/spec.png" alt="Aviator sunglasses" />
      </div>
    </section>

    <div class="slide-controls" aria-label="Product navigation">
      <button class="arrow" aria-label="Next product">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M9 5L16 12L9 19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
      <button class="arrow" aria-label="Previous product">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M15 5L8 12L15 19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </div>

    <footer class="bottom-bar" aria-label="Purchase panel">
      <div class="bar-block">
        <strong class="product-name">Aviator</strong>
        <span class="price">£150</span>
      </div>

      <div class="bar-block swatches" id="slideSwatches" aria-label="Frame color options">
      </div>

      <div class="bar-block">
        <button class="details" type="button">
          Product Details
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path d="M6 9L12 15L18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
      </div>

      <button class="add-cart" type="button">ADD TO CART</button>
    </footer>

    <section class="grid-view" aria-label="Grid product listing">
      <div class="grid-products" id="gridProducts"></div>
    </section>
  </main>

  <template id="productCardTemplate">
    <article class="product-card">
      <div class="product-media"><img src="" alt="" /></div>
      <div class="product-info">
        <div class="product-meta"><strong></strong><span></span></div>
        <div class="product-palette" aria-label="Available frame colors"></div>
      </div>
    </article>
  </template>

  <h1 class="sr-only">eyepointoptic sunglasses product page</h1>

  <script>
    const page = document.querySelector(".card");
    const viewButtons = document.querySelectorAll(".toggle-btn");
    const gridProducts = document.querySelector("#gridProducts");
    const productCardTemplate = document.querySelector("#productCardTemplate");
    const heroCopies = document.querySelectorAll(".hero-copy");
    const slideImage = document.querySelector("#slideSpecImage");
    const slideName = document.querySelector(".product-name");
    const slidePrice = document.querySelector(".price");
    const slideSwatches = document.querySelector("#slideSwatches");
    const nextButton = document.querySelector(".arrow[aria-label='Next product']");
    const prevButton = document.querySelector(".arrow[aria-label='Previous product']");

    const DEFAULT_COLORS = ["#1a1a1a", "#333333", "#555555"];

    const PRODUCTS = [
      { name: "Aviator", price: 150, image: "../assets/spec.png", colors: DEFAULT_COLORS },
      { name: "Wayfarer", price: 140, image: "../assets/aurther.png", colors: DEFAULT_COLORS },
      { name: "Clubmaster", price: 160, image: "../assets/spec.png", colors: DEFAULT_COLORS }
    ];

    const SLIDE_PRODUCTS = PRODUCTS.slice(0, 2);
    let currentSlideIndex = 0;

    function formatPrice(amount) {
      return "£" + amount;
    }

    function createPaletteDot(color) {
      const dot = document.createElement("span");
      dot.className = "mini-swatch";
      dot.style.setProperty("--dot-color", color);
      return dot;
    }

    function createSlideSwatch(color, index) {
      const swatch = document.createElement("button");
      swatch.className = "swatch";
      swatch.type = "button";
      swatch.style.setProperty("--swatch-color", color);
      return swatch;
    }

    function renderGridProducts(items) {
      const fragment = document.createDocumentFragment();
      items.forEach((product) => {
        const card = productCardTemplate.content.cloneNode(true);
        const image = card.querySelector("img");
        const name = card.querySelector("strong");
        const price = card.querySelector(".product-meta span");
        const palette = card.querySelector(".product-palette");
        image.src = product.image;
        name.textContent = product.name;
        price.textContent = formatPrice(product.price);
        product.colors.forEach((color) => {
          palette.appendChild(createPaletteDot(color));
        });
        fragment.appendChild(card);
      });
      gridProducts.replaceChildren(fragment);
    }

    function applySlideProduct(index) {
      const product = SLIDE_PRODUCTS[index];
      if (!product) return;
      heroCopies.forEach((node) => {
        node.textContent = product.name.toUpperCase();
      });
      slideName.textContent = product.name;
      slidePrice.textContent = formatPrice(product.price);
      slideSwatches.replaceChildren(
        ...product.colors.map((color, index) => createSlideSwatch(color, index))
      );
      slideImage.classList.add("is-switching");
      setTimeout(() => {
        slideImage.src = product.image;
      }, 110);
      setTimeout(() => {
        slideImage.classList.remove("is-switching");
      }, 220);
    }

    function moveSlide(step) {
      currentSlideIndex = (currentSlideIndex + step + SLIDE_PRODUCTS.length) % SLIDE_PRODUCTS.length;
      applySlideProduct(currentSlideIndex);
    }

    function setView(mode) {
      page.dataset.view = mode;
      viewButtons.forEach((btn) => {
        const isActive = btn.dataset.view === mode;
        btn.classList.toggle("active", isActive);
      });
    }

    viewButtons.forEach((btn) => {
      btn.addEventListener("click", () => setView(btn.dataset.view));
    });
    nextButton.addEventListener("click", () => moveSlide(1));
    prevButton.addEventListener("click", () => moveSlide(-1));
    renderGridProducts(PRODUCTS);
    applySlideProduct(currentSlideIndex);
    setView("slide");
  </script>
</body>
</html>
