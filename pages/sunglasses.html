<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eyepointoptic | Sunglasses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #b6b6b6;
      --panel: #ebe8e4;
      --text: #161616;
      --text-soft: #4b4b4b;
      --text-muted: #7a7a7a;
      --white: #ffffff;
      --accent: #c5a021;
      --shadow: 0 28px 45px rgba(40, 40, 40, 0.25);
      --bar-shadow: 0 16px 35px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(140deg, #edeae6 0%, var(--panel) 48%, #e7e4df 100%);
      color: var(--text);
      font-family: "Sora", sans-serif;
      overflow-x: hidden;
    }

    .card {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* Fixed Header */
    .top-row {
      position: fixed;
      left: 30px;
      right: 30px;
      top: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .logo {
      letter-spacing: -0.07em;
      font-size: 2.15rem;
      font-weight: 600;
      text-transform: lowercase;
      text-decoration: none;
      color: inherit;
    }

    .header-right { display: flex; gap: 15px; align-items: center; }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      z-index: 2000;
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s;
      opacity: 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 24px;
      height: 18px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1100;
      padding: 0;
    }
    .hamburger span { display: block; width: 100%; height: 2px; background-color: var(--text); transition: 0.3s; }
    .hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    .mobile-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1050;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      opacity: 0;
      visibility: hidden;
      transition: 0.4s;
    }
    .mobile-overlay.active { opacity: 1; visibility: visible; }
    .mobile-overlay a { font-size: 2rem; font-weight: 700; text-decoration: none; color: var(--text); text-transform: uppercase; }

    /* Product Details Overlay */
    .details-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1200;
      display: flex;
      flex-direction: column;
      padding: 60px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      overflow-y: auto;
    }
    .details-overlay.active { opacity: 1; visibility: visible; }
    .details-close {
      position: absolute; top: 30px; right: 30px; width: 44px; height: 44px;
      display: grid; place-items: center; cursor: pointer; background: rgba(0,0,0,0.05); border-radius: 50%;
    }
    .details-content { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .details-image img { width: 100%; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1)); }
    .details-info h2 { font-size: 3rem; font-weight: 800; margin-bottom: 20px; }
    .details-info .price { font-size: 1.5rem; font-weight: 600; color: var(--accent); margin-bottom: 30px; display: block; }
    .details-info p { font-size: 1rem; line-height: 1.8; color: var(--text-soft); margin-bottom: 40px; }
    
    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 30px; }
    .spec-item label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 8px; }
    .spec-item span { font-size: 0.9rem; font-weight: 600; }

    .side-nav {
      position: absolute; left: 30px; top: 222px; display: grid; gap: 15px; z-index: 5;
    }
    .side-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 500; }
    .side-nav a.active { color: var(--text); font-weight: 600; }

    .view-toggle {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 101; display: inline-flex; background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 999px; padding: 4px; backdrop-filter: blur(8px);
    }
    .toggle-btn { border: none; background: transparent; font-family: inherit; font-size: 0.75rem; font-weight: 600; padding: 10px 24px; border-radius: 999px; cursor: pointer; }
    .toggle-btn.active { background: var(--text); color: var(--white); }

    .hero { height: 100%; width: 100%; display: grid; place-items: center; position: relative; }
    .hero-copy {
      position: absolute; top: 46%; left: 50%; transform: translate(-50%, -50%);
      font-size: clamp(3rem, 12vw, 9rem); letter-spacing: 0.15em; color: rgba(255, 255, 255, 0.6); font-weight: 800; white-space: nowrap; z-index: 1;
    }

    .spec-holder { z-index: 4; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1)); }
    .spec-image { width: min(760px, 85vw); transition: 0.3s; }

    .slide-controls { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); display: grid; gap: 12px; z-index: 6; }
    .arrow { width: 44px; height: 44px; border: none; background: transparent; color: #585858; cursor: pointer; display: grid; place-items: center; }

    .bottom-bar {
      position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
      width: min(940px, 100% - 40px); height: 84px; background: var(--white);
      display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.5fr; z-index: 10;
    }
    .bar-block { border-right: 1px solid #eee; display: flex; align-items: center; justify-content: center; padding: 0 20px; gap: 15px; }
    .bar-block:last-child { border-right: none; }
    .product-name { font-size: 1.5rem; font-weight: 500; }
    .price { font-size: 0.9rem; color: var(--text-soft); }

    .swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; box-shadow: inset 0 0 0 2px white, 0 0 0 1px #ddd; }
    .add-cart { background: var(--text); color: var(--white); border: none; font-weight: 700; cursor: pointer; }

    .grid-view { position: absolute; inset: 0; display: none; background: var(--panel); padding: 120px 20px 40px; overflow-y: auto; z-index: 90; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
    .grid-item { background: var(--white); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; }
    .grid-item img { width: 100%; height: 160px; object-fit: contain; }

    .card[data-view="grid"] .grid-view { display: block; }
    .card[data-view="grid"] .hero, .card[data-view="grid"] .bottom-bar, .card[data-view="grid"] .slide-controls { display: none; }

    @media (max-width: 1024px) {
      .hamburger { display: flex; }
      .side-nav { display: none; }
      .top-row { left: 20px; right: 20px; }
      .bottom-bar { grid-template-columns: 1fr; height: auto; width: 100%; }
      .bar-block { border-right: none; border-bottom: 1px solid #eee; padding: 20px; }
      .details-overlay { padding: 40px 20px; }
      .details-content { grid-template-columns: 1fr; gap: 40px; }
    }
  </style>
</head>
<body>
  <div class="mobile-overlay" id="mobileOverlay">
    <a href="index.html">Home</a>
    <a href="glasses.html">Glasses</a>
    <a href="sunglasses.html" style="font-weight: 800;">Sunglasses</a>
    <a href="contact-lenses.html">Contact Lenses</a>
  </div>

  <div class="details-overlay" id="detailsOverlay">
    <div class="details-close" onclick="toggleDetails()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </div>
    <div class="details-content">
      <div class="details-image"><img id="detailsImg" src="../assets/spec.png"></div>
      <div class="details-info">
        <h2 id="detailsTitle">Aviator</h2>
        <span class="price" id="detailsPrice">Rs. 1500</span>
        <p id="detailsDesc">Engineered for performance and style, our Aviator series features high-grade polarized lenses.</p>
        <div class="specs-grid">
          <div class="spec-item"><label>Lens</label><span>Polarized</span></div>
          <div class="spec-item"><label>Material</label><span>Alloy</span></div>
        </div>
      </div>
    </div>
  </div>

  <main class="card" id="pageCard" data-view="slide">
    <header class="top-row">
      <a href="index.html" class="logo">eyepointoptic</a>
      <div class="header-right">
        <a href="cart.html" style="color: inherit; text-decoration: none; display: flex; align-items: center;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        </a>
        <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
      </div>
    </header>

    <div class="view-toggle">
      <button class="toggle-btn active" id="btnSlide">Slide</button>
      <button class="toggle-btn" id="btnGrid">Grid</button>
    </div>

    <nav class="side-nav">
      <a href="glasses.html">Glasses</a>
      <a class="active" href="sunglasses.html">Sunglasses</a>
      <a href="contact-lenses.html">Contact Lenses</a>
    </nav>

    <section class="hero">
      <div class="hero-copy" id="heroText">AVIATOR</div>
      <div class="spec-holder"><img class="spec-image" id="mainImage" src="../assets/spec.png"></div>
    </section>

    <div class="slide-controls">
      <button class="arrow" onclick="moveSlide(-1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
      <button class="arrow" onclick="moveSlide(1)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></button>
    </div>

    <footer class="bottom-bar">
      <div class="bar-block"><strong class="product-name" id="prodName">Aviator</strong></div>
      <div class="bar-block"><span class="price" id="prodPrice">Rs. 1500</span></div>
      <div class="bar-block"><button style="background:none;border:none;cursor:pointer;" onclick="toggleDetails()">Product Details</button></div>
      <button class="add-cart" onclick="addToCart()">ADD TO CART</button>
    </footer>

    <section class="grid-view">
      <div class="grid-container" id="gridContainer"></div>
    </section>
  </main>

  <script>
    const products = [
      { name: "Aviator", price: "Rs. 1500", image: "../assets/spec.png", desc: "Classic polarized aviators." },
      { name: "Wayfarer", price: "Rs. 1400", image: "../assets/aurther.png", desc: "Bold and iconic style." },
      { name: "Clubmaster", price: "Rs. 1600", image: "../assets/spec.png", desc: "Intellectual refined look." }
    ];

    let currentIdx = 0;
    const card = document.getElementById('pageCard');

    function toggleMenu() {
      document.getElementById('hamburgerBtn').classList.toggle('active');
      document.getElementById('mobileOverlay').classList.toggle('active');
    }

    function toggleDetails() {
      const overlay = document.getElementById('detailsOverlay');
      overlay.classList.toggle('active');
      if (overlay.classList.contains('active')) {
        const p = products[currentIdx];
        document.getElementById('detailsTitle').textContent = p.name;
        document.getElementById('detailsPrice').textContent = p.price;
        document.getElementById('detailsImg').src = p.image;
        document.getElementById('detailsDesc').textContent = p.desc;
      }
    }

    function selectProduct(idx) {
      currentIdx = idx;
      const p = products[idx];
      document.getElementById('mainImage').src = p.image;
      document.getElementById('prodName').textContent = p.name;
      document.getElementById('prodPrice').textContent = p.price;
      document.getElementById('heroText').textContent = p.name.toUpperCase();
      card.dataset.view = 'slide';
      document.getElementById('btnSlide').classList.add('active');
      document.getElementById('btnGrid').classList.remove('active');
    }

    function moveSlide(step) {
      currentIdx = (currentIdx + step + products.length) % products.length;
      selectProduct(currentIdx);
    }

    document.getElementById('btnSlide').onclick = () => selectProduct(currentIdx);
    document.getElementById('btnGrid').onclick = () => {
      card.dataset.view = 'grid';
      document.getElementById('btnGrid').classList.add('active');
      document.getElementById('btnSlide').classList.remove('active');
    };

    const grid = document.getElementById('gridContainer');
    products.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      item.onclick = () => selectProduct(i);
      item.innerHTML = `<img src="${p.image}"><p><strong>${p.name}</strong></p><p>${p.price}</p>`;
      grid.appendChild(item);
    });

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 100);
      
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 600);
      }, 3000);
    }

    function addToCart() {
      const p = products[currentIdx];
      const cart = JSON.parse(localStorage.getItem('eyepointCart')) || [];
      cart.push({
        name: p.name,
        price: p.price,
        image: p.image,
        category: 'Sunglasses'
      });
      localStorage.setItem('eyepointCart', JSON.stringify(cart));
      showToast('Added to Bag!');
    }
  </script>
</body>
</html>
